version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: portfolio-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite:///portfolio.db
    volumes:
      - backend_data:/app
    networks:
      - portfolio-net

  frontend:
    build:
      context: ./frontend
    container_name: portfolio-frontend
    restart: unless-stopped
    networks:
      - portfolio-net

  nginx:
    image: nginx:alpine
    container_name: portfolio-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - frontend
      - backend
    networks:
      - portfolio-net

volumes:
  backend_data:

networks:
  portfolio-net:
    driver: bridge